<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prasidh Shetty — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0908;
      --surface: #161410;
      --border: rgba(236,106,67,0.16);
      --gold: #ec6a43;
      --gold-dim: rgba(236,106,67,0.12);
      --text: #efe9dd;
      --muted: rgba(239,233,221,0.45);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Satoshi', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(236,106,67,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236,106,67,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-family: 'Hahmlet', serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .logo span { color: var(--gold); }

    .tagline {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 40px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      text-align: left;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Satoshi', sans-serif;
      font-size: 1rem;
      padding: 14px 48px 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--gold);
    }

    .toggle-vis {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-vis:hover { color: var(--text); }

    .btn {
      width: 100%;
      background: var(--gold);
      color: #0d0d0d;
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      padding: 15px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .error {
      margin-top: 16px;
      font-size: 0.82rem;
      color: #e07070;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error.visible { opacity: 1; }

    .shake {
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="logo">PRASIDH<span>.</span></div>
    <p class="tagline">UX &amp; UI Designer — Detroit, MI</p>
    <div class="divider"></div>

    <label for="pwd">Enter Password</label>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="••••••••••••" autocomplete="current-password" />
      <button class="toggle-vis" id="toggleVis" aria-label="Show/hide password" tabindex="-1">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="btn" id="submitBtn">Enter Portfolio</button>
    <p class="error" id="errorMsg">Incorrect password. Please try again.</p>
  </div>

  <script>
    const CORRECT = 'BanditSpicy@220792';
    const SESSION_KEY = 'ps_auth';

    // If already authenticated, go straight to destination
    const params = new URLSearchParams(window.location.search);
    const dest = params.get('next') || 'index.html';
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      window.location.replace(dest);
    }

    const pwd = document.getElementById('pwd');
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    const card = document.getElementById('card');
    const toggleVis = document.getElementById('toggleVis');
    const eyeIcon = document.getElementById('eyeIcon');

    // Show/hide password toggle
    toggleVis.addEventListener('click', () => {
      const isHidden = pwd.type === 'password';
      pwd.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    function attempt() {
      if (pwd.value === CORRECT) {
        sessionStorage.setItem(SESSION_KEY, '1');
        window.location.replace(dest);
      } else {
        err.classList.add('visible');
        card.classList.remove('shake');
        void card.offsetWidth; // reflow to restart animation
        card.classList.add('shake');
        pwd.value = '';
        pwd.focus();
      }
    }

    btn.addEventListener('click', attempt);
    pwd.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  </script>

</body>
</html>
